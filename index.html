<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRITICAL: This viewport allows proper fullscreen and rotation -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Car Mechanical - Fullscreen Mobile</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* Canvas should fill exactly */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* START OVERLAY - with prominent fullscreen button */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #start-overlay h1 {
            font-size: clamp(28px, 8vw, 48px);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #fullscreen-btn {
            background: #f1c40f;
            color: #2c3e50;
            border: none;
            border-radius: 50px;
            padding: 20px 40px;
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            margin: 30px 0;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            border: 2px solid white;
            min-width: 280px;
            max-width: 400px;
            touch-action: manipulation;
        }

        #fullscreen-btn:active {
            transform: scale(0.95);
        }

        #orientation-msg {
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 18px;
            display: none;
            border: 2px solid white;
        }

        #orientation-msg.show {
            display: block;
        }

        /* Other UI elements (unchanged from before) */
        #hit-counter-box {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #f1c40f;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            z-index: 100;
            display: none;
            font-size: 16px;
            border: 2px solid #f1c40f;
            backdrop-filter: blur(5px);
        }

        #gui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            z-index: 100;
            display: none;
            width: 240px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        #pedal-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: none;
            gap: 15px;
            z-index: 100;
        }

        .pedal {
            width: 90px;
            height: 140px;
            background: rgba(0,0,0,0.8);
            border: 3px solid white;
            border-radius: 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            touch-action: manipulation;
            backdrop-filter: blur(5px);
        }

        .pedal.active {
            background: #f1c40f;
            color: black;
            border-color: #f1c40f;
            transform: translateY(5px);
        }

        #steering-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 200px;
            height: 200px;
            display: none;
            z-index: 100;
            touch-action: none;
        }

        #ui-wheel {
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="rgba(0,0,0,0.8)" stroke="white" stroke-width="4"/><circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/><line x1="50" y1="4" x2="50" y2="20" stroke="%23f1c40f" stroke-width="4"/><line x1="15" y1="35" x2="85" y2="35" stroke="white" stroke-width="6"/><line x1="50" y1="35" x2="50" y2="90" stroke="white" stroke-width="6"/><circle cx="50" cy="50" r="8" fill="white"/></svg>') no-repeat center;
            background-size: contain;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .pedal {
                width: 70px;
                height: 110px;
                font-size: 14px;
            }
            #steering-container {
                width: 150px;
                height: 150px;
            }
        }

        @media (orientation: portrait) {
            #orientation-msg.show {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- Simple, clean start overlay with explicit fullscreen button -->
    <div id="start-overlay">
        <h1>🏎️ CAR SIMULATOR</h1>
        <button id="fullscreen-btn">▶ ENTER FULLSCREEN</button>
        <div id="orientation-msg">↻ PLEASE ROTATE TO LANDSCAPE</div>
    </div>

    <!-- Game UI elements -->
    <div id="hit-counter-box">HITS: <span id="rock-hit-count">0</span></div>

    <div id="gui">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <button id="btn-auto" style="background:#34495e; color:white; border:none; padding:5px 10px;">AUTO</button>
            <button id="btn-clear" style="background:#3498db; color:white; border:none; padding:5px 10px;">CLEAR</button>
            <button id="btn-reset" style="background:#e74c3c; color:white; border:none; padding:5px 10px;">RESET</button>
        </div>
        <div>Speed: <span id="speed-val">0</span></div>
        <div>Steer: <span id="steer-val">0</span>°</div>
        <div>Status: <span id="status">OK</span></div>
    </div>

    <div id="pedal-container">
        <div id="pedal-brake" class="pedal">BRAKE</div>
        <div id="pedal-accel" class="pedal">GAS</div>
    </div>

    <div id="steering-container">
        <div id="ui-wheel"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ========== SIMPLIFIED FULLSCREEN & ORIENTATION HANDLER ==========
        const startOverlay = document.getElementById('start-overlay');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const orientMsg = document.getElementById('orientation-msg');
        
        // Function to enter fullscreen and start the game
        async function enterFullscreenAndStart() {
            console.log('Attempting to enter fullscreen...');
            
            const element = document.documentElement;
            
            // Try different fullscreen methods
            try {
                if (element.requestFullscreen) {
                    await element.requestFullscreen();
                } else if (element.webkitRequestFullscreen) {
                    await element.webkitRequestFullscreen();
                } else if (element.mozRequestFullScreen) {
                    await element.mozRequestFullScreen();
                } else if (element.msRequestFullscreen) {
                    await element.msRequestFullscreen();
                }
                console.log('Fullscreen activated');
            } catch (err) {
                console.warn('Fullscreen failed:', err);
                // Continue anyway - some browsers block it
            }

            // Try to lock orientation (optional - won't break if not supported)
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape').catch(e => {
                        console.log('Orientation lock not available');
                    });
                }
            } catch (err) {
                console.log('Orientation lock failed');
            }

            // Hide overlay and show game UI
            startOverlay.style.display = 'none';
            document.getElementById('hit-counter-box').style.display = 'block';
            document.getElementById('gui').style.display = 'block';
            document.getElementById('pedal-container').style.display = 'flex';
            document.getElementById('steering-container').style.display = 'block';
            
            // Force canvas resize after UI changes
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 100);
        }

        // Button click triggers fullscreen
        fullscreenBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            enterFullscreenAndStart();
        });

        // Also allow tapping anywhere on overlay to start
        startOverlay.addEventListener('click', (e) => {
            // Don't trigger if clicking the button (button has its own handler)
            if (e.target === fullscreenBtn) return;
            enterFullscreenAndStart();
        });

        // Orientation detection
        function checkOrientation() {
            const isPortrait = window.innerHeight > window.innerWidth;
            if (isPortrait) {
                orientMsg.classList.add('show');
            } else {
                orientMsg.classList.remove('show');
            }
        }
        
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', checkOrientation);
        checkOrientation();

        // ========== THREE.JS SETUP ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Handle resize properly
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ========== GAME CONFIG ==========
        const CONFIG = {
            maxSpeed: 30,
            steerSensitivity: 0.4,
            rockDensity: 15
        };

        // Simple car and world setup (simplified for clarity)
        const car = new THREE.Group();
        scene.add(car);
        
        // Add a simple car body
        const bodyGeo = new THREE.BoxGeometry(2, 1, 4);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.5;
        car.add(body);

        // Add wheels
        const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.5, 16);
        const wheelMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        
        const positions = [[-1.2, 0.3, 1.5], [1.2, 0.3, 1.5], [-1.2, 0.3, -1.5], [1.2, 0.3, -1.5]];
        positions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI/2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            car.add(wheel);
        });

        // Add lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        light.castShadow = true;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Add ground
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x2ecc71 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI/2;
        ground.position.y = 0;
        scene.add(ground);

        // Add some rocks
        const rocks = [];
        for (let i = 0; i < 10; i++) {
            const rockGeo = new THREE.DodecahedronGeometry(0.5 + Math.random());
            const rockMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set((Math.random() - 0.5) * 20, 0.5, (Math.random() - 0.5) * 20);
            scene.add(rock);
            rocks.push(rock);
        }

        // ========== CONTROLS ==========
        let speed = 0;
        let steerAngle = 0;
        const inputs = { w: false, space: false, a: false, d: false };

        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') inputs.w = true;
            if (key === ' ') inputs.space = true;
            if (key === 'a') inputs.a = true;
            if (key === 'd') inputs.d = true;
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') inputs.w = false;
            if (key === ' ') inputs.space = false;
            if (key === 'a') inputs.a = false;
            if (key === 'd') inputs.d = false;
        });

        // Touch controls
        const pedalGas = document.getElementById('pedal-accel');
        const pedalBrake = document.getElementById('pedal-brake');
        
        pedalGas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            inputs.w = true;
            pedalGas.classList.add('active');
        });
        
        pedalGas.addEventListener('touchend', (e) => {
            e.preventDefault();
            inputs.w = false;
            pedalGas.classList.remove('active');
        });
        
        pedalBrake.addEventListener('touchstart', (e) => {
            e.preventDefault();
            inputs.space = true;
            pedalBrake.classList.add('active');
        });
        
        pedalBrake.addEventListener('touchend', (e) => {
            e.preventDefault();
            inputs.space = false;
            pedalBrake.classList.remove('active');
        });

        // Steering wheel
        const wheel = document.getElementById('steering-container');
        let wheelActive = false;
        
        wheel.addEventListener('touchstart', (e) => {
            e.preventDefault();
            wheelActive = true;
        });
        
        wheel.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!wheelActive) return;
            
            const touch = e.touches[0];
            const rect = wheel.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            
            const angle = Math.atan2(touch.clientY - centerY, touch.clientX - centerX);
            steerAngle = angle * 0.5; // Scale down
            steerAngle = Math.max(-1, Math.min(1, steerAngle));
            
            document.getElementById('ui-wheel').style.transform = `rotate(${angle}rad)`;
        });
        
        wheel.addEventListener('touchend', (e) => {
            e.preventDefault();
            wheelActive = false;
            steerAngle = 0;
            document.getElementById('ui-wheel').style.transform = 'rotate(0rad)';
        });

        // UI Buttons
        document.getElementById('btn-reset').addEventListener('click', () => {
            car.position.set(0, 0.5, 0);
            car.rotation.y = 0;
            speed = 0;
        });

        // ========== GAME LOOP ==========
        function update() {
            // Simple physics
            if (inputs.w) {
                speed += 0.1;
            } else if (inputs.space) {
                speed -= 0.15;
            } else {
                speed *= 0.98;
            }
            
            speed = Math.max(-10, Math.min(CONFIG.maxSpeed, speed));
            
            // Apply steering
            car.rotation.y += steerAngle * 0.02;
            
            // Move car
            car.position.x += Math.sin(car.rotation.y) * speed * 0.05;
            car.position.z += Math.cos(car.rotation.y) * speed * 0.05;
            
            // Camera follow
            camera.position.x = car.position.x;
            camera.position.y = 3;
            camera.position.z = car.position.z + 8;
            camera.lookAt(car.position);
            
            // Update UI
            document.getElementById('speed-val').textContent = Math.round(Math.abs(speed));
            document.getElementById('steer-val').textContent = Math.round(steerAngle * 45);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
